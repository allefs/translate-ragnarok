
```yaml name=docker-compose.yml
services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - TR_ENABLE_ONLINE_SOURCES=false
      - TR_USER_AGENT=translate-ragnarok/0.1
    volumes:
      - ./api:/app

  web:
    build: ./web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - api